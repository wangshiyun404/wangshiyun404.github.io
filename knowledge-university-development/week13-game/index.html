<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>第13周课堂小游戏｜未来大学雷达站</title><style>body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',Arial,sans-serif;background:linear-gradient(135deg,#061222,#10385a);color:#eef7ff}main{max-width:1050px;margin:auto;padding:36px 20px 80px}h1{font-size:clamp(38px,7vw,78px);line-height:1;margin:18px 0}.lead{font-size:20px;line-height:1.7;color:#d9eaff}.card{background:#ffffff12;border:1px solid #ffffff22;border-radius:24px;padding:22px;margin:18px 0;box-shadow:0 18px 50px #0005}.score{position:sticky;top:0;background:#061222dd;padding:12px 16px;border-radius:0 0 20px 20px;backdrop-filter:blur(12px)}button{display:block;width:100%;margin:8px 0;padding:13px;border-radius:14px;border:1px solid #ffffff33;background:#ffffff12;color:#eef7ff;text-align:left;cursor:pointer;font-size:16px}.ok{background:#41d99333!important}.bad{background:#ff6b6b33!important}.pill{display:inline-block;margin:4px;padding:5px 10px;border-radius:999px;background:#30d5ff22;border:1px solid #30d5ff66}.btn{display:inline-block;width:auto;text-align:center;padding:11px 15px;border-radius:999px;background:linear-gradient(135deg,#30d5ff,#ffd166);color:#061222;text-decoration:none;font-weight:900}</style></head><body><main><div class="score">积分：<strong id="score">0</strong> ｜称号：<span id="level">新手学习者</span> <a class="btn" href="../week13/">返回课程网页</a></div><h1>未来大学雷达站</h1><p class="lead">作为课堂预热与课后复习小游戏，帮助学生快速识别技术变革、学习型社会、终身教育、微证书与AI对大学的挑战。</p><section class="card"><h2>关卡1：概念配对</h2><p>“微证书”最接近哪种含义？</p><button onclick="judge(this,0,'微证书不是简单短课名称，而是对较小学习成果的结构化证明。')">A. 任何一分钟短视频课程</button><button onclick="judge(this,1,'正确：微证书强调对较小学习成果的证明，并可与终身学习和就业能力连接。')">B. 对较小学习成果的结构化证明</button><button onclick="judge(this,0,'微证书不等于取消学位，而是与学位、职业培训等形成组合。')">C. 完全取代大学学位</button></section><section class="card"><h2>关卡2：真相判官</h2><p>“AI进入大学后，教师就不再重要了。”</p><button onclick="judge(this,0,'不准确。AI改变教师角色，但高质量教学仍需要价值判断、学习设计、反馈与陪伴。')">正确</button><button onclick="judge(this,1,'正确。AI会重塑教师工作，但不会自动替代教师的教育判断与育人责任。')">有问题</button></section><section class="card"><h2>关卡3：复习诊断</h2><p>请选择你认为第13周最重要的关键词：</p><button onclick="keyword('终身学习')">终身学习</button><button onclick="keyword('AI赋能')">AI赋能</button><button onclick="keyword('开放教育')">开放教育</button><p id="out"></p></section><section class="card"><h2>资料来源</h2><p><span class="pill">UNESCO</span><span class="pill">WEF 2025</span><span class="pill">OECD Micro-credentials</span><span class="pill">EU Micro-credentials</span><span class="pill">MIT OCW</span><span class="pill">ASU/OpenAI</span></p></section></main><script>let s=0;function up(){document.getElementById('score').textContent=s;document.getElementById('level').textContent=s<20?'新手学习者':s<40?'未来大学观察员':'终身学习设计师'}function judge(b,ok,msg){if(b.dataset.done)return;b.parentElement.querySelectorAll('button').forEach(x=>x.dataset.done=1);b.classList.add(ok?'ok':'bad');if(ok)s+=20;up();alert(msg)}function keyword(k){s+=10;up();document.getElementById('out').textContent='你的复习关键词是：'+k+'。请尝试用一句话说明它怎样改变大学的知识使命。'}up()</script></body></html>
